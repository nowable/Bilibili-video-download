<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B 站视频下载器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .status-area {
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
            display: none;
        }

        .status-area.show {
            display: block;
        }

        .status-message {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            word-break: break-word;
        }

        .progress-container {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }

        .success {
            color: #4CAF50;
            font-weight: bold;
        }

        .error {
            color: #f44336;
            font-weight: bold;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .tips {
            margin-top: 20px;
            padding: 15px;
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            border-radius: 5px;
            font-size: 14px;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 B 站视频下载器</h1>
        <p class="subtitle">输入视频链接，一键下载高清视频</p>

        <div class="input-group">
            <input 
                type="text" 
                id="videoUrl" 
                placeholder="请输入 B 站视频链接（如：https://www.bilibili.com/video/BV...）"
            >
        </div>

        <button class="btn" id="downloadBtn" onclick="startDownload()">
            🚀 开始下载
        </button>

        <div class="status-area" id="statusArea">
            <div class="status-message" id="statusMessage"></div>
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar">0%</div>
            </div>
        </div>

        <div class="tips">
            💡 <strong>使用提示：</strong><br>
            • 支持普通视频链接和分享链接<br>
            • 自动提取最高画质<br>
            • 下载完成后文件保存在当前目录<br>
            • 请勿用于商业用途，尊重版权
        </div>
    </div>

    <script>
        let statusInterval = null;

        async function startDownload() {
            const urlInput = document.getElementById('videoUrl');
            const downloadBtn = document.getElementById('downloadBtn');
            const statusArea = document.getElementById('statusArea');
            const statusMessage = document.getElementById('statusMessage');
            const progressBar = document.getElementById('progressBar');
            const progressContainer = document.getElementById('progressContainer');

            const url = urlInput.value.trim();
            
            if (!url) {
                alert('请输入视频链接！');
                return;
            }

            // 禁用按钮
            downloadBtn.disabled = true;
            downloadBtn.innerHTML = '<span class="loading-spinner"></span>下载中...';

            // 显示状态区域
            statusArea.classList.add('show');
            progressContainer.style.display = 'block';
            statusMessage.innerHTML = '<span class="loading-spinner"></span>正在启动下载任务...';
            progressBar.style.width = '0%';
            progressBar.textContent = '0%';

            try {
                // 发送下载请求
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url: url })
                });

                const result = await response.json();

                if (result.success) {
                    // 开始轮询状态
                    startStatusPolling();
                } else {
                    showError(result.message);
                    downloadBtn.disabled = false;
                    downloadBtn.innerHTML = '🚀 开始下载';
                }
            } catch (error) {
                showError('网络错误：' + error.message);
                downloadBtn.disabled = false;
                downloadBtn.innerHTML = '🚀 开始下载';
            }
        }

        function startStatusPolling() {
            statusInterval = setInterval(async () => {
                try {
                    const response = await fetch('/api/status');
                    const status = await response.json();
                    updateStatus(status);

                    if (!status.downloading && status.progress === 100) {
                        // 下载完成
                        clearInterval(statusInterval);
                        document.getElementById('downloadBtn').disabled = false;
                        document.getElementById('downloadBtn').innerHTML = '🚀 开始下载';
                    } else if (!status.downloading && status.progress < 100) {
                        // 下载失败或中断
                        clearInterval(statusInterval);
                        document.getElementById('downloadBtn').disabled = false;
                        document.getElementById('downloadBtn').innerHTML = '🚀 开始下载';
                    }
                } catch (error) {
                    console.error('状态更新失败:', error);
                }
            }, 1000); // 每秒更新一次
        }

        function updateStatus(status) {
            const statusMessage = document.getElementById('statusMessage');
            const progressBar = document.getElementById('progressBar');

            if (status.message.includes('✅')) {
                statusMessage.innerHTML = `<span class="success">${status.message}</span>`;
            } else if (status.message.includes('❌')) {
                statusMessage.innerHTML = `<span class="error">${status.message}</span>`;
            } else {
                statusMessage.innerHTML = `<span class="loading-spinner"></span>${status.message}`;
            }

            if (status.progress > 0) {
                progressBar.style.width = status.progress + '%';
                progressBar.textContent = status.progress.toFixed(1) + '%';
            }
        }

        function showError(message) {
            const statusArea = document.getElementById('statusArea');
            const statusMessage = document.getElementById('statusMessage');
            const progressContainer = document.getElementById('progressContainer');

            statusArea.classList.add('show');
            progressContainer.style.display = 'none';
            statusMessage.innerHTML = `<span class="error">${message}</span>`;
        }

        // 按回车键也可以触发下载
        document.getElementById('videoUrl').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                startDownload();
            }
        });
    </script>
</body>
</html>
